<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVKK Parental Consent — Evergreen Learning Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --green:#143A2E; --green-2:#1d5240; --amber:#D29239;
  --cream:#F7F4EC; --paper:#ffffff; --ink:#23271f; --muted:#5b6660;
  --line:#d8d2c4; --line-2:#cfc8b6; --field-bg:#fcfbf7;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--cream); color:var(--ink);
  font-family:"Figtree",system-ui,Segoe UI,Roboto,sans-serif;
  font-size:15px; line-height:1.55;
}
h1,h2,h3{font-family:"Fraunces",Georgia,serif; font-weight:600; color:var(--green); margin:0}

/* ---- toolbar (screen only) ---- */
.toolbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:12px 20px; background:var(--green); color:#fff;
}
.toolbar .brand{display:flex; align-items:center; gap:10px; font-family:"Fraunces",serif; font-size:16px}
.toolbar .brand svg{flex:none}
.toolbar .controls{display:flex; align-items:center; gap:10px}
.langset{display:inline-flex; border:1px solid rgba(255,255,255,.4); border-radius:999px; overflow:hidden}
.lang-btn{
  appearance:none; border:0; background:transparent; color:#fff;
  font-family:"Figtree",sans-serif; font-size:13px; font-weight:600;
  padding:6px 14px; cursor:pointer; letter-spacing:.02em;
}
.lang-btn[aria-pressed="true"]{background:var(--amber); color:#1a1a1a}
.print-btn{
  appearance:none; border:0; border-radius:999px; cursor:pointer;
  background:#fff; color:var(--green); font-family:"Figtree",sans-serif;
  font-weight:600; font-size:13px; padding:7px 16px;
  display:inline-flex; align-items:center; gap:7px;
}
.print-btn:hover{background:var(--amber); color:#1a1a1a}

/* ---- sheet ---- */
.wrap{padding:28px 16px 60px}
.sheet{
  max-width:820px; margin:0 auto; background:var(--paper);
  border:1px solid var(--line); border-radius:14px; overflow:hidden;
  box-shadow:0 18px 48px -28px rgba(20,58,46,.45);
}
.sheet-head{
  background:var(--green); color:#fff; padding:28px 36px;
  display:flex; align-items:center; gap:18px;
}
.sheet-head .mark{flex:none}
.sheet-head .ht{display:flex; flex-direction:column; gap:3px}
.sheet-head .org{font-family:"Fraunces",serif; font-size:17px; font-weight:500; letter-spacing:.01em}
.sheet-head .role{font-size:12.5px; color:#cfe0d8; font-weight:500; letter-spacing:.04em; text-transform:uppercase}
.sheet-head h1{color:#fff; font-size:24px; line-height:1.15; margin-top:2px}
.sheet-head .sub{font-size:12.5px; color:#cfe0d8; margin-top:2px}
.accent-rule{height:4px; background:var(--amber)}

.note{
  margin:0; padding:12px 36px; background:#fbf4e6;
  border-bottom:1px solid var(--line);
  font-size:12.5px; color:#6b5a37;
}
.note strong{color:#8a6d2c}

.body{padding:30px 36px 38px}

/* ---- sections ---- */
.sec{margin:0 0 26px; break-inside:avoid}
.sec h2{
  font-size:16.5px; display:flex; align-items:baseline; gap:11px;
  padding-bottom:8px; border-bottom:1px solid var(--line);
  margin-bottom:16px;
}
.sec h2 .num{
  font-family:"Figtree",sans-serif; font-size:12px; font-weight:600;
  color:var(--amber); border:1.5px solid var(--amber); border-radius:50%;
  width:24px; height:24px; display:inline-flex; align-items:center;
  justify-content:center; flex:none;
}

.grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 22px}
.field{display:flex; flex-direction:column; gap:5px; margin-bottom:14px}
.grid .field{margin-bottom:0}
.field.col-2{grid-column:1 / -1}
label{font-size:12.5px; font-weight:600; color:var(--muted)}
input[type=text], input[type=tel], input[type=email], input[type=date], textarea{
  font-family:"Figtree",sans-serif; font-size:14.5px; color:var(--ink);
  background:var(--field-bg); border:1px solid var(--line-2); border-radius:7px;
  padding:9px 11px; width:100%; min-height:40px;
}
textarea{min-height:74px; resize:vertical; line-height:1.5}
input:focus, textarea:focus{
  outline:none; border-color:var(--green-2);
  box-shadow:0 0 0 3px rgba(29,82,64,.14);
}

/* options */
.opts{display:flex; flex-direction:column; gap:9px; margin-top:2px}
.opts.row{flex-direction:row; flex-wrap:wrap; gap:9px 22px}
.opt{display:flex; align-items:flex-start; gap:9px; font-size:14px; color:var(--ink); cursor:pointer}
.opt input{margin-top:2px; width:17px; height:17px; flex:none; accent-color:var(--green)}

/* legal text */
.legal{font-size:13.5px; color:#3c423a; margin:0 0 10px}
.legal a{color:var(--green-2)}
ul.legal{padding-left:20px; margin:0 0 12px}
ul.legal li{margin-bottom:5px}

/* explicit-consent callout */
.consent{
  border:1.5px solid var(--green); border-radius:10px; padding:16px 18px;
  background:#f4f7f4; margin-bottom:14px; break-inside:avoid;
}
.consent.strong-consent{border-color:var(--amber); background:#fbf4e6}
.consent .opt{font-size:14px; font-weight:500}

/* signature */
.signrow{display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-top:8px}
.sigbox{display:flex; flex-direction:column; gap:6px}
.sigline{
  border-bottom:1.4px solid var(--ink); height:42px; margin-bottom:3px;
}
.sigbox .cap{font-size:12px; color:var(--muted); font-weight:600}
.sigbox input{background:transparent; border:0; border-bottom:1.4px solid var(--ink);
  border-radius:0; padding:4px 2px; min-height:36px}
.sigbox input:focus{box-shadow:none; border-bottom-color:var(--green-2)}

.footer-line{
  margin:30px 36px 0; padding-top:14px; border-top:1px solid var(--line);
  font-size:11.5px; color:var(--muted); display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
}

@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .signrow{grid-template-columns:1fr; gap:22px}
  .sheet-head{padding:22px}
  .body{padding:22px}
  .note,.footer-line{padding-left:22px; padding-right:22px}
}

/* ===========  PRINT  =========== */

/* ── Send guide (screen only, hidden on print) ── */
.send-guide{
  margin:32px 36px 0; padding:24px 28px 28px;
  background:#f4f7f4; border:2px solid var(--green); border-radius:12px;
}
.send-guide h3{
  font-family:"Fraunces",serif; font-size:18px; color:var(--green); margin:0 0 6px;
}
.sg-intro{font-size:13.5px; color:var(--muted); margin:0 0 18px}
.sg-tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px}
.sg-tab{
  appearance:none; border:1.5px solid var(--line-2); border-radius:999px;
  background:#fff; color:var(--green); font-family:"Figtree",sans-serif;
  font-size:13px; font-weight:600; padding:7px 16px; cursor:pointer;
}
.sg-tab[aria-selected="true"]{background:var(--green); color:#fff; border-color:var(--green)}
.sg-panel{display:none}
.sg-panel.active{display:block}
.sg-panel ol{margin:0 0 6px; padding-left:22px; font-size:13.5px; line-height:1.75; color:var(--ink)}
.sg-panel ol li{margin-bottom:5px}
.sg-divider{
  display:flex; align-items:center; gap:12px;
  font-size:12px; color:var(--muted); margin:18px 0;
}
.sg-divider::before,.sg-divider::after{content:""; flex:1; height:1px; background:var(--line)}
.wa-btn{
  display:inline-flex; align-items:center; gap:10px;
  background:#25D366; color:#fff; border:0; border-radius:10px;
  font-family:"Figtree",sans-serif; font-size:14px; font-weight:600;
  padding:12px 22px; cursor:pointer; text-decoration:none;
}
.wa-btn:hover{background:#1ebe5d}
.wa-btn svg{flex:none}
.sg-email{font-size:13px; color:var(--muted); margin:14px 0 0}
.sg-email strong{color:var(--green-2)}
@media(max-width:640px){
  .send-guide{margin:24px 0 0; border-radius:0 0 14px 14px; border-left:0; border-right:0}
}
@media print{.send-guide{display:none !important}}

@media print{
  @page{size:A4; margin:16mm 15mm}
  body{background:#fff; font-size:11.5pt}
  .toolbar{display:none !important}
  .wrap{padding:0}
  .sheet{max-width:none; border:0; border-radius:0; box-shadow:none}
  /* lighter header to save ink, keep brand */
  .sheet-head{
    background:#fff !important; color:var(--green) !important;
    padding:0 0 10px; border-bottom:2px solid var(--green);
  }
  .sheet-head .role,.sheet-head .sub{color:var(--muted) !important}
  .sheet-head h1{color:var(--green) !important; font-size:20pt}
  .sheet-head .mark .leaf{fill:var(--green) !important}
  .accent-rule{background:var(--amber); -webkit-print-color-adjust:exact; print-color-adjust:exact}
  .note{background:#f6f1e6 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; padding:8px 0}
  .body{padding:14px 0 0}
  .footer-line{margin:18px 0 0}
  .sec h2 .num{-webkit-print-color-adjust:exact; print-color-adjust:exact}
  input,textarea{background:#fff !important; border-color:#888 !important}
  .consent{-webkit-print-color-adjust:exact; print-color-adjust:exact; break-inside:avoid}
  .sec{break-inside:avoid}
  .signrow{break-inside:avoid}
}
</style>
</head>

rocessed", "dataList": "<li>Identity data (child's and parent's name, date of birth, ID number)</li><li>Contact data (phone, email, address)</li><li><strong>Health and diagnosis data — special-category personal data</strong> (diagnosis, developmental status, medication, relevant medical notes)</li><li>Education data (school history, IEP/BEP, previous support and therapies)</li>", "s5": "Purposes of Processing", "purposeList": "<li>Planning and delivering an individual education programme suited to the child</li><li>Tracking development and preparing regular progress reports</li><li>Family communication and appointment/schedule management</li><li>Meeting legal obligations</li>", "s6": "Retention and Transfer", "retention": "Data is held securely for the duration of the service relationship and any applicable legal retention periods, then deleted or anonymised. Data is not shared with third parties without your explicit consent, except where legally required.", "s7": "Your Rights (KVKK Article 11)", "rightsList": "<li>To learn whether your personal data is processed</li><li>To request information if it is</li><li>To request correction of incomplete or inaccurate data</li><li>To request deletion or destruction</li><li>To object to the processing</li>", "s8": "Explicit Consent Declaration", "consentIntro": "I have read and understood the disclosure above. I declare my explicit consent on the following:", "consentGeneral": "I give explicit consent to the processing of my child's and my own identity, contact and education data for the purposes stated above.", "consentHealth": "I separately and explicitly consent, pursuant to KVKK Article 6, to the processing of my child's health and diagnosis data (special-category personal data) for the purposes stated above.", "s9": "Signature", "parentSignCap": "Parent / guardian name and signature", "sendTitle": "How to Send This Form", "sendIntro": "Once you have filled in the form, follow the steps for your device to save it as a PDF and send it to Evergreen Learning Studio.", "deviceIphone": "📱 iPhone / iPad", "deviceAndroid": "📱 Android Phone", "devicePC": "💻 Computer", "iphoneSteps": "<li>Tap the <strong>Share</strong> button at the bottom of the screen (square with an arrow).</li><li>Select <strong>\"Print\"</strong> from the list (scroll down if you don't see it).</li><li>Pinch out on the small preview to open the PDF full-screen.</li><li>Tap <strong>Share</strong> again in the top right.</li><li>Choose <strong>WhatsApp</strong> or <strong>Mail</strong> → send to Evergreen Learning Studio.</li>", "androidSteps": "<li>Tap the <strong>⋮ menu</strong> in the top right of your browser.</li><li>Select <strong>\"Print\"</strong>.</li><li>Choose <strong>\"Save as PDF\"</strong> as the printer.</li><li>Save → send the PDF via WhatsApp or email.</li>", "pcSteps": "<li>Press <strong>Ctrl + P</strong> (Windows) or <strong>Cmd + P</strong> (Mac).</li><li>Choose <strong>\"Save as PDF\"</strong> from the printer list.</li><li>Save the file to your desktop.</li><li>Send the PDF via <strong>email</strong> or <strong>WhatsApp</strong>.</li>", "orText": "— or —", "whatsappBtn": "Send via WhatsApp", "whatsappMsg": "Hello Hello, I have filled in the form. I am sending the PDF in this message.", "sendNote": "You can also email the PDF to <strong>hello@evergreenlearningstudio.com</strong>", "printBtnLabel": "Save as PDF"}};
let lang = localStorage.getItem('ztt_lang') || 'tr';
function applyLang(l){
  if(!I18N[l]) l='tr';
  lang=l; localStorage.setItem('ztt_lang',l);
  document.documentElement.lang=l;
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n');
    if(I18N[l][k]!==undefined) el.innerHTML=I18N[l][k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){
    var k=el.getAttribute('data-i18n-ph');
    if(I18N[l][k]!==undefined) el.setAttribute('placeholder', I18N[l][k]);
  });
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.setAttribute('aria-pressed', b.dataset.lang===l ? 'true':'false');
  });
}
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.addEventListener('click',function(){applyLang(b.dataset.lang);});
  });
  document.getElementById('printBtn').addEventListener('click',function(){window.print();});
  applyLang(lang);
});

// ── Send guide tab switching ──────────────────────────────────────────────
document.querySelectorAll('.sg-tab').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.sg-tab').forEach(function(b){ b.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.sg-panel').forEach(function(p){ p.classList.remove('active'); });
    btn.setAttribute('aria-selected','true');
    document.getElementById('panel-'+btn.dataset.panel).classList.add('active');
  });
});
// ── WhatsApp message updates with language ────────────────────────────────
function updateWaBtn(){
  var msg = (I18N[lang] && I18N[lang].whatsappMsg) ? I18N[lang].whatsappMsg : '';
  document.getElementById('waBtn').href = 'https://wa.me/905000000000?text='+encodeURIComponent(msg);
}
// patch applyLang so WhatsApp message also switches language
var _origApply = applyLang;
applyLang = function(l){ _origApply(l); updateWaBtn(); };
